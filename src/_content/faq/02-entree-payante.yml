question: "L'entrée est-elle payante ?"
reponse: |
  L'entrée à la fête est **gratuite**.

  Certaines animations sont payantes à l'unité à titre caritatif (tir à la carabine, pêche à la ligne, jambon perché, tombola 2 €), ainsi que la restauration et la buvette.

  Chaque euro soutient l'action solidaire du CŒSPC au profit des plus démunis.
categorie: Pratique
ordre: 2
