# ══ EN BREF ══
enBrefTitre: "En bref"
texteIntro: |
  <p>La <strong>Fête Villageoise d'Annecy-le-Vieux</strong> est un événement populaire organisé chaque année depuis 1950 par le <strong>CŒSPC</strong> (Comité des Œuvres Sociales Paroissiales et Communales), une association loi 1901 entièrement bénévole.</p>
  <p>L'intégralité des bénéfices est reversée au <strong>CCAS</strong> (Centre Communal d'Action Sociale) pour un tiers, et aux <strong>œuvres sociales paroissiales</strong> pour les deux tiers restants.</p>
  <p>La fête propose une tartiflette géante, une tombola avec plus de 40 lots offerts par les commerces locaux, des jeux, des animations, et l'Ancilevienne, une course à pied créée en 1985.</p>

