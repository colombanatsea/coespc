année: 2015
numero_edition: 65
date_evenement: '2015-09-13'
titre: Fête Villageoise 2015
theme: Saga Africa — l'Afrique s'invite à Annecy-le-Vieux
affiche: /assets/images/affiche-2015.jpg
resume: 'Le dimanche 13 septembre 2015 , le chef-lieu d''Annecy-le-Vieux s''est animé « aux couleurs de l''Afrique ! » . Cette
  édition célébrait aussi les 30 ans de jumelage entre Annecy-le-Vieux et Dori (Burkina Faso) , portés par l'' Association
  Échange Sahel qui a proposé « spectacles, concerts et expositions d''avril à novembre 2015 » .


  À 9 h 00, vente de billets et départ de l''Ancilevienne avec 1 050 coureurs (30 e anniversaire de la course, captation drone).
  Malgré une petite pluie matinale, la météo s''est améliorée et l''après-midi a vu les djembés de La Gazelle Mandiak et leurs
  danseuses en costumes colorés animer la place.


  Repas thématique africain à midi, puis jeux : tir, pêche, jeux en bois, fléchettes. L''article post-événement titrait « Saga
  Africa ! Ce dimanche 13 septembre 2015 l''Afrique nous a enchanté ! » .'
