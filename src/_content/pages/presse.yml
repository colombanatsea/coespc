boilerplateTexte: |
  <p>La <strong>Fête Villageoise d'Annecy-le-Vieux</strong> est un événement populaire à vocation caritative organisé chaque année depuis 1950 par le <strong>CŒSPC</strong> (Comité des Œuvres Sociales Paroissiales et Communales), association loi 1901 entièrement bénévole. L'intégralité des bénéfices est reversée aux plus démunis : 1/3 au CCAS d'Annecy, 2/3 aux œuvres sociales de la paroisse. La 74<sup>e</sup> édition aura lieu le dimanche 13 septembre 2026 au chef-lieu d'Annecy-le-Vieux.</p>

