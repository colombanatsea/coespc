solidarite:
  description: 'La remise de chèque a eu lieu le 8 décembre 2017 à l''annexe mairie d''Annecy-le-Vieux, au profit du CCAS
    / CŒSPC et de la paroisse. Étaient présents : Christian Travert (trésorier), Christian Balmain (président), Guylaine Allantaz
    (1 re adjointe), Françoise Tarpin (adjointe Action sociale et logement), Père Michel et Dominique Cressend (adjoint Annecy-le-Vieux).
    Événement couvert par Le Dauphiné Libéré .'
