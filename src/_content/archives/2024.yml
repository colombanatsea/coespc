année: 2024
numero_edition: 72
date_evenement: '2024-09-08'
titre: Fête Villageoise 2024
theme: Tartiflette, jambon perché et parcours gonflable
affiche: /assets/images/affiche-2024.jpg
resume: 'Le 2 e dimanche de septembre 2024, le chef-lieu d''Annecy-le-Vieux a accueilli une nouvelle édition placée sous le
  signe de la gastronomie savoyarde et des jeux familiaux. La tartiflette-salade a régalé les convives, complétée par frites-saucisse,
  crêpes, gaufres et glaces.


  Côté animations : cage interactive, cage de foot-penalty, quatre jeux d''adresse « fête foraine », grande structure gonflable
  avec parcours et toboggan pour enfants, concours de tir pour grands et petits (trois boîtes à ballons), pêche à la ligne
  pour les plus petits, et deux concours emblématiques : la « Hauteur du Jambon perché » et le « Poids du Panier garni » .


  Appel lancé par le comité : « Et venez nombreux vous amuser avec nous ! » . Les billets de tombola étaient proposés à 2 €
  via HelloAsso, tirage à 17 h 30 Place Gabriel Fauré.'
