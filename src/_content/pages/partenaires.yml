# ══ DEVENIR PARTENAIRE ══
devenirTag: "Rejoignez-nous"
devenirTitre: "Devenir partenaire"
devenirDesc: "Vous êtes commerçant, restaurateur, artisan ou chef d'entreprise à Annecy-le-Vieux ? Associez votre enseigne à la plus ancienne fête caritative du village. Trois façons de nous soutenir."
devenirWay1Titre: "Offrir un lot tombola"
devenirWay1Texte: "Un repas, un bon d'achat, un panier garni, un séjour. Les principaux lots figurent sur les 3 000 tickets imprimés, sont présentés en ligne et sur nos réseaux sociaux, et chaque partenaire est remercié au micro lors du tirage au sort."
devenirWay2Titre: "Devenir partenaire premium"
devenirWay2Texte: "Visibilité accrue : banderole, sacs aux couleurs du partenaire, personnalisation des gilets des bénévoles utilisés lors des visites chez les partenaires, des ventes de billets de tombola, le jour J, lors des remises de chèque à la mairie et à la paroisse."
devenirWay3Titre: "Don ou mécénat"
devenirWay3Texte: "Soutenez directement l'association par un don. Le CŒSPC reverse l'intégralité des bénéfices à la paroisse, à l'école et aux associations du village."

