<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration &ndash; Fête Villageoise d'Annecy-le-Vieux</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/assets/images/favicon-coq.svg" type="image/svg+xml">
  
  <style>
    /* Thème CŒSPC pour Decap CMS */
    :root {
      --coespc-bleu: #142477;
      --coespc-or: #F4B365;
      --coespc-ambre: #D4760A;
      --coespc-creme: #FDF6E8;
    }
    body { background: var(--coespc-creme); }
    /* Customisation header Decap */
    [class*="AppHeader"] { background: var(--coespc-bleu) !important; }
    [class*="AppHeader"] a { color: var(--coespc-or) !important; }
    [class*="SiteURL"] { color: var(--coespc-or) !important; }
    /* Couleurs boutons publier */
    button[class*="SaveButton"] { background: var(--coespc-ambre) !important; }
    /* Limite taille du logo sur page login */
    [class*="LogoIcon"],
    [class*="AuthenticationPage"] img,
    [class*="login"] img {
      max-width: 140px !important;
      max-height: 140px !important;
      width: auto !important;
      height: auto !important;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
  <script>
    // Attente chargement puis init
    window.CMS_MANUAL_INIT = false;
  </script>
</body>
</html>
