titre: Fête Villageoise 2022
theme: Grande fête traditionnelle de rentrée familiale
affiche: /assets/images/affiche-2022.jpg
resume: 'La Fête Villageoise s''est déroulée le dimanche
  11 septembre 2022 , de 9 h à 18 h, au chef-lieu d''Annecy-le-Vieux. Une « grande fête traditionnelle de rentrée familiale »
  très attendue par les habitants.


  Au menu : polenta signée Traiteur DIOS , complétée de frites-saucisse, crêpes, gaufres et glaces. Buvette complète avec
  vin, bière pression, eau, jus de fruits, spritz, café et thé. Tout au long de la journée : jeux, animations et stands tenus
  par les bénévoles.


  Grande nouveauté de cette édition : la vente de billets de tombola en ligne via HelloAsso du 1 er août au 11 septembre 2022,
  accompagnée d''un QR code sur l''affiche. Tirage à 17 h 30 le jour J.'
