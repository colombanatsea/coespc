annee: 2017
numero_edition: 67
date_evenement: '2017-09-10'
titre: Fête Villageoise 2017
theme: Fête et traditions savoyardes — « Du bon, du beau, du pur cru savoyard »
affiche: /assets/images/affiche-2017.jpg
resume: 'Le dimanche 10 septembre 2017 , édition placée sous le thème « Traditionnellement vôtre ! » , saluée comme « un bon
  cru savoyard » . La journée a débuté tôt avec près de 2 000 cyclistes et coureurs au départ de l''Ancilevienne, pour un
  tour du lac en équipes de deux.


  La place s''est animée toute la journée : repas savoyard à partir de 12 h 30, groupe folk Lô P''tiouts Jean Vovray Annecy
  , Pierrot le Colporteur pour les enfants (chansons et spectacles), jeux en bois gratuits au Parc Fauré, Annecy Trampoline
  , stand maquillage, glaces au profit de l''école et démonstrations de la Salésienne Gymnastique .


  Message du président Christian Balmain : « les bénéfices de la Fête soutiennent les œuvres sociales de la paroisse et de
  la commune — une tradition de 50 ans. »'
