titre: Fête Villageoise 2025
theme: 'Record : 55 lots de tombola'
affiche: /assets/images/affiche-2025.png
resume: 'L''édition 2025 de la Fête Villageoise a marque un record historique avec pas moins de 55 lots de tombola et le soutien
  de 38 partenaires . Une mobilisation exceptionnelle qui témoigne de l''attachement des commerçants et entreprises locales
  à cet événement incontournable d''Annecy-le-Vieux.


  Cote musique, les festivaliers ont pu profiter des concerts d'' A la Rue.com et de l'' Orchestre de Rue des Faxs , pour
  une ambiance festive et entrainante tout au long de la journée.'
