annee: 2013
numero_edition: 63
date_evenement: '2013-09-08'
titre: Fête Villageoise 2013
theme: « Entre les averses ! » — tradition, pluie et bonne humeur
affiche: /assets/images/affiche-2013.jpg
resume: 'Le dimanche 8 septembre 2013 , la fête s''est tenue Place de l''église et de la mairie, au chef-lieu d''Annecy-le-Vieux.
  La pluie s''est invitée en abondance : « il fallait s''armer d''un bon parapluie » . Les organisateurs ont adapté le plan
  d''implantation pour maintenir un maximum de stands et animations sous les barnums.


  Au menu traiteur animé par le groupe Lou Philosophes : terrine de lapin aux noisettes, rôti de veau sauce crème ciboulette,
  gratin, fromage et salade de fruits. Animations : clown Claudius , concert des Flasharmonicas à 16 h, frites, sandwichs
  et concours de tir.


  Les associations ancileviennes (culturelles et sportives) pouvaient tenir un stand pour présenter leurs activités tout au
  long de la journée.'
partenaires:
- Lou Philosophes (animation repas)
- Clown Claudius
- Les Flasharmonicas
- Traiteur du repas
