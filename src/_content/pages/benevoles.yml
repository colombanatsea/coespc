# ══ INSCRIPTION ══
inscriptionTitre: "Comment s'inscrire ?"
inscriptionTexte: |
  <p>Contactez-nous en message privé sur Instagram ou Facebook. Précisez votre nom, le ou les postes qui vous intéressent et vos disponibilités. Nous revenons vers vous rapidement.</p>
inscriptionNote: "Aucune expérience requise – juste de la bonne volonté et le sourire !"
