titre: Fête Villageoise 2014
theme: Viva Brasil — la fête à la brésilienne
affiche: /assets/images/affiche-2014.jpg
resume: 'Le dimanche 14 septembre 2014 , en pleine année de Coupe du Monde, la Fête Villageoise « accueille le Brésil ! »
  . Appel lancé par le comité : « Venez nombreux ce dimanche 14 septembre pour vivre un moment de fête à la brésilienne ! »
  . Le bilan fut à la hauteur : « la tradition et les couleurs brésiliennes ont enflammé la fête ! » .


  Au programme : capoeira , danses brésiliennes, repas « à la Brésilienne » , musique live avec les Flasharmonicas , démonstrations
  de trampoline , buvette, sandwichs, pâtisseries, concours de tir et jeux pour tous âges.


  Du soleil brésilien sur la colline d''Annecy-le-Vieux : « Viva Brasil ! »'
