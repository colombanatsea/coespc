question: "Comment acheter des billets de tombola ?"
reponse: |
  En ligne sur [Tombola & Billetterie (HelloAsso)](https://www.helloasso.com/associations/comite-des-oeuvres-sociales-paroissiales-et-commun) ou sur place le jour de la fête.

  **2 € le billet.** Tirage à 17 h 30.
