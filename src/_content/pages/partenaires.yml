# ══ INTRO SOUTIENS ══
soutiensTag: "Nos soutiens"
soutiensTitre: "Ils soutiennent la fête"
soutiensDesc: "La Fête Villageoise ne serait rien sans l'engagement des commerçants, restaurateurs et entreprises d'Annecy-le-Vieux. Chaque année, ils offrent les lots de la tombola, financent la plaquette programme et font vivre la tradition villageoise."
soutiensCitation: "« La Fête Villageoise, c'est l'occasion pour les commerçants du village de se retrouver autour d'une tradition qui nous dépasse tous. Offrir un repas ou un bon d'achat, c'est soutenir la paroisse, l'école, le tissu associatif. C'est aussi fidéliser nos clients autour d'une cause commune. » – Un restaurateur d'Annecy-le-Vieux, partenaire depuis 15 ans"

