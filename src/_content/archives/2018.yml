année: 2018
numero_edition: 68
date_evenement: '2018-09-09'
titre: Fête Villageoise 2018
theme: « On rêve et on chante… ! » — entre danses et chants
affiche: /assets/images/affiche-2018.jpg
resume: 'Le dimanche 9 septembre 2018 , la Fête Villageoise s''est placée sous le thème « On rêve et on chante… ! » : l''article
  post-événement titrait « 2018 : Entre danses et chants, mon cœur balance… » . Ambiance ensoleillée, esprit familial et intergénérationnel.


  Dès 9 h, près de 2 000 compétiteurs ont pris le départ de l''Ancilevienne pour un tour du lac en équipes. Puis la journée
  s''est animée avec la Compagnie Petites Poucettes (chants et histoires), un bal familial « ori-génial » sur thème animalier,
  les démonstrations de la Salésienne Gymnastique , Annecy Trampoline pour enfants, maquillage, jeux en bois et concours de
  tir.


  Le repas, d''inspiration espagnole, a été servi à table. Buvette, sandwichs, frites, pâtisseries et glaces complétaient
  l''offre. La tombola proposait cette année-là 350 lots .'
