<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — COESPC</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="dashboard-page">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <img src="/assets/images/logo-coespc.png" alt="" width="40" height="40">
        <span class="sidebar-title">Admin</span>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-link active" data-section="accueil">Accueil</button>
        <button class="sidebar-link" data-section="edition-2026">Edition 2026</button>
        <button class="sidebar-link" data-section="tombola">Tombola</button>
        <button class="sidebar-link" data-section="partenaires">Partenaires</button>
        <button class="sidebar-link" data-section="benevoles">Benevoles</button>
        <button class="sidebar-link" data-section="contact">Contact</button>
        <button class="sidebar-link" data-section="archives">Archives</button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logoutBtn">Deconnexion</button>
      </div>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title" id="pageTitle">Accueil</h1>
        <div class="admin-topbar-actions">
          <span class="last-modified" id="lastModified"></span>
          <button class="btn-admin-primary btn-publish" id="publishBtn">Publier les modifications</button>
        </div>
      </div>
      <div class="admin-content" id="adminContent">
        <p class="admin-loading">Chargement...</p>
      </div>
      <div class="toast" id="toast" hidden>Modifications publiees !</div>
    </main>
  </div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
