visibilite1Titre: "Annonce au micro"
visibilite1Texte: "Chaque lot est nommé lors du tirage devant 2 000 personnes."
visibilite2Titre: "Plaquette programme"
visibilite2Texte: "Mention dans les 5 000 plaquettes mises à disposition dans le village."
visibilite3Titre: "Site web & réseaux"
visibilite3Texte: "Présence sur cette page et sur nos posts Instagram et Facebook."
visibilite4Titre: "Signalétique jour J"
visibilite4Texte: "Votre nom affiché sur le podium et les stands durant la fête."

# ══ PLAQUETTE PROGRAMME ══
plaquetteTag: "Notre vitrine"
plaquetteTitre: "La plaquette programme"
plaquetteLede: "Chaque année, la plaquette programme de la Fête Villageoise est mise à disposition chez les commerçants, dans les écoles, les églises et les lieux publics d'Annecy-le-Vieux et Veyrier. C'est le support de référence qui accompagne le village jusqu'au jour J."

# ══ CTA FINAL ══
ctaFinalTag: "Ensemble"
ctaFinalTitre: "Rejoignez la 74e édition"
ctaFinalDesc: "Une tradition villageoise depuis 1950. 43 partenaires nous ont déjà rejoints pour 2026. Il reste encore une place pour la vôtre. Contactez-nous et associez votre enseigne à la fête du 13 septembre 2026."
