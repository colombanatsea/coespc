restaurationTitre: "Restauration"
restaurationTexte: |
  <p>La <strong>tartiflette géante</strong> est le plat signature de la Fête Villageoise. Préparée par la <strong>Poêle Géante</strong> avec du reblochon fermier, elle est servie sur place avec une bonne salade.</p>
  <div class="price-card">
    <div class="price-card-inner">
      <h3>Tartiflette géante</h3>
      <p class="price">12,50 €</p>
      <p>Préparée par la Poêle Géante et servie avec une bonne salade.</p>
    </div>
  </div>
  <p>Également disponibles à des tarifs accessibles à tous : saucisses, frites, crêpes, glaces, barbe à papa. Au bar : vins, bières, spritz et kir, à consommer avec modération, mais aussi sirops, jus de fruits, boissons fraîches. Buvette tenue par nos bénévoles (d'ailleurs, si vous voulez nous donner un coup de main, vous serez les bienvenus et vous passerez un bon moment !).<br>Service continu de 12h à 15h30.</p>
