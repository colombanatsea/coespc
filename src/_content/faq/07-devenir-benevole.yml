question: "Comment devenir bénévole ?"
reponse: |
  Écrivez-nous à [fetevillageoise@pcr74.fr](mailto:fetevillageoise@pcr74.fr) en précisant votre nom, le ou les postes qui vous intéressent et vos disponibilités.

  La fête mobilise **50 bénévoles** chaque année.

  [→ Rejoindre les bénévoles](/benevoles.html)
