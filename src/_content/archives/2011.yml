année: 2011
numero_edition: 61
date_evenement: '2011-09-11'
titre: Fête Villageoise 2011
theme: Sonneurs de Savoye, Country Club et Brigade cynophile
affiche: /assets/images/affiche-2011.jpg
resume: 'L''édition 2011 s''est tenue le 2 e dimanche de septembre au chef-lieu d''Annecy-le-Vieux. Les animations annoncées
  dès juin 2011 mettaient à l''honneur trois temps forts : les Sonneurs de Savoye (cor des Alpes), le Hillbilly Country Club
  (danses country) et la Brigade cynophile de la Gendarmerie .


  Citation du programme : « De nombreuses animations sont prévues pour cette année. Parmi celles-ci : Les Sonneurs de Savoye
  (Cor des Alpes), Hillbilly Country Club (Dances Country) et la Brigade Cynophile de la Gendarmerie ! »


  Président du comité cette année-là : François Faure .'
partenaires:
- Les Sonneurs de Savoye (cor des Alpes)
- Hillbilly Country Club (danses country)
- Brigade cynophile de la Gendarmerie
solidarite:
  description: 'La remise de chèque a eu lieu le lundi 12 décembre 2011 en mairie, pour un montant de 4 000 € — bénéfices
    de l''édition 2011 reversés au CCAS (Centre Communal d''Action Sociale) via le Comité des Œuvres Sociales Paroissiales
    et Communales.


    Étaient présents : François Faure (président du comité), Christian Travert (trésorier), Françoise Rayot (adjointe au maire)
    ainsi que des conseillers municipaux. Le comité a souligné « l''importance de cette fête au cœur du village » et la mission
    de responsabilité sociale portée par son équipe.'
