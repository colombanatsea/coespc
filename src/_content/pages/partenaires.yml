# ══ DEVENIR PARTENAIRE ══
devenirTag: "Rejoignez-nous"
devenirTitre: "Devenir partenaire"
devenirDesc: "Vous êtes commerçant, restaurateur, artisan ou chef d'entreprise à Annecy-le-Vieux ? Associez votre enseigne à la plus ancienne fête caritative du village. Trois façons de nous soutenir."
devenirWay1Titre: "Offrir un lot tombola"
devenirWay1Texte: "Un repas, un bon d'achat, un panier garni, un séjour. Votre lot est annoncé au micro lors du tirage devant 2 000 personnes, mentionné sur la plaquette programme et présenté sur nos réseaux sociaux."
devenirWay2Titre: "Encart plaquette programme"
devenirWay2Texte: "Réservez un encart publicitaire dans les 5 000 plaquettes déposées chez les commerçants, dans les écoles, les églises et les lieux publics d'Annecy-le-Vieux et Veyrier dès fin août. Tarifs et formats sur demande."
devenirWay3Titre: "Don ou mécénat"
devenirWay3Texte: "Soutenez directement l'association par un don. Le CŒSPC reverse l'intégralité des bénéfices à la paroisse, à l'école et aux associations du village."

