name = "fete-villageoise"
compatibility_date = "2024-01-01"

[vars]
# Set ADMIN_PASSWORD and JWT_SECRET via Cloudflare dashboard (Settings > Variables)

[[kv_namespaces]]
binding = "CONTENT"
id = "" # To be filled after creating KV namespace in Cloudflare dashboard

[[kv_namespaces]]
binding = "IG"
id = "" # Jeton Instagram (cle "token") — voir docs/INSTAGRAM-CONNECTOR.md ; binding a poser aussi dans Pages > Settings > Functions

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "fete-villageoise-assets"
