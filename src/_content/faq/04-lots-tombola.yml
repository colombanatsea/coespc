question: "Quels sont les lots de la tombola ?"
reponse: |
  Les lots sont offerts par les partenaires locaux : repas dans les meilleurs restaurants d'Annecy-le-Vieux (Le Clos des Sens, La Cour de l'Abbaye, Café Brunet…), paniers gourmands, bons d'achat.

  **Les lots 2026 seront publiés en août.**
categorie: Tombola
ordre: 4
