annee: 2016
numero_edition: 66
date_evenement: '2016-09-11'
titre: Fête Villageoise 2016
theme: Années 80 & Grèce éternelle — Corfou
affiche: /assets/images/affiche-2016.jpg
resume: 'Le dimanche 11 septembre 2016 , l''édition s''est déroulée sous un soleil radieux, à tel point que « tout le monde
  cherchait de l''ombre pour cette fête 2016 » . Le thème : Années 80 , décidé lors de l''assemblée générale du 8 février
  2016 à la salle Saint-Laurent devant une trentaine de membres.


  Les points d''animation étaient répartis entre le parvis de l''église (buvette à l''ombre du clocher) et le parc Gabriel
  Fauré (jeux en bois à l''ombre, barbe à papa). DJ années 80 pour les adultes, jeux en bois pour les enfants, repas grec
  le midi et Ancilevienne le matin (course/vélo).


  La tombola mettait à l''honneur la Grèce éternelle avec un séjour tout compris à Corfou comme lot principal.'
