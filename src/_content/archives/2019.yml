annee: 2019
numero_edition: 69
date_evenement: '2019-09-08'
titre: Fête Villageoise 2019
theme: Une journée sous la pluie, un bilan humoristique et chaleureux
affiche: /assets/images/affiche-2019.jpg
resume: 'Le dimanche 8 septembre 2019 , le chef-lieu d''Annecy-le-Vieux a vécu une édition au bilan « mitigé » : « la météo
  ne nous a pas été favorable. Pluie, vent et froid ont éloigné les visiteurs » en début d''après-midi, selon le bilan dressé
  en réunion.


  Malgré la météo, les points positifs ont été nombreux : nouvelles activités, jeux et concours toute la journée, tombola
  « chargée de lots » , repas savoyard apprécié. Les axes d''amélioration identifiés : renforcer la diffusion de l''information
  et la signalétique.


  La réunion bilan du 28 octobre 2019, présidée par Jean-François Point dans une « ambiance chaleureuse et humoristique »
  , s''est achevée sur un optimisme partagé pour 2020 — édition qui sera finalement annulée en raison de la crise sanitaire.'
