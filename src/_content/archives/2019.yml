solidarite:
  description: '« Comme chaque année notre comité remet une partie des bénéfices de la Fête Villageoise aux œuvres sociales
    de la paroisse et au CCAS de la commune. Ce lundi 6 janvier nous étions conviés en mairie déléguée d''Annecy le Vieux
    pour la remise du chèque de solidarité d''un montant de 1500 €. »


    La remise de chèque a eu lieu le lundi 6 janvier 2020 en mairie déléguée d''Annecy-le-Vieux, pour un montant de 1 500 €
    au profit des œuvres sociales de la paroisse et du CCAS. Étaient présents : Jean-François Point (président), les secrétaires
    et le trésorier, une dizaine de bénévoles, Jean-Luc Rigaut et Bernard Accoyer (maires), ainsi que des élus de la nouvelle
    commune d''Annecy.'
