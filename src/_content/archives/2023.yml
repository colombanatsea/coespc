affiche: /assets/images/affiche-2023.jpg
resume: 'Le 2 e dimanche de septembre 2023, la Place Gabriel Fauré a vibré au rythme d''une journée conviviale associant musique,
  jeux interactifs, restauration et buvette. Au programme : tir à la carabine, pêche à la ligne, ballons à percer, structures
  gonflables, jeux d''adresse et grande cible.


  La tombola, véritable cœur de l''événement, proposait 45 lots avec tirage à 17 h 30. Les billets étaient vendus à 2 € sur
  place ou en ligne via HelloAsso, chaque achat soutenant les actions sociales du CŒSPC.'
